# Placeholder __BACKEND_UPSTREAM__ is replaced at container start (see docker-entrypoint.d).
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        # Docker / Swarm embedded DNS — defer resolve so nginx starts even if the API host is not ready yet.
        resolver 127.0.0.11 valid=10s ipv6=off;
        client_max_body_size 2048m;
        # Large uploads over slower links can exceed nginx defaults.
        client_body_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        set $api_upstream __BACKEND_UPSTREAM__;
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
